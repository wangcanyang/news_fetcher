name: Scrape News

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

env:
  LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
  LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  D1_DATABASE_NAME: ${{ secrets.D1_DATABASE_NAME }}

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser
          npm install -g wrangler

      - name: Run scraper
        run: python news_fetcher.py
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}

      - name: Write to D1
        run: |
          # 先清理7天前数据，再插入新数据
          wrangler d1 execute $D1_DATABASE_NAME \
            --command="$(cat public/data/news.sql)" \
            --yes
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_NAME: ${{ secrets.D1_DATABASE_NAME }}

      - name: Commit news data
        uses: EndBug/add-and-commit@v10
        with:
          add: public/data/
          message: "Update news data"
          push: true
