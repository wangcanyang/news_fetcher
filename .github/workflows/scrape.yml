name: Scrape News

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

env:
  LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
  LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser

      - name: Run scraper
        run: python3 news_fetcher.py
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}

      - name: Write to D1
        run: |
          CONTENT=$(cat public/data/news.sql)
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/b466f9c49bdaaf9f52f9ba696a0f4744/d1/database/72d3a19e-c519-4901-822d-9041536c6796/import" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: text/plain" \
            --data "$CONTENT"

      - name: Commit news data
        uses: EndBug/add-and-commit@v10
        with:
          add: public/data/
          message: "Update news data"
          push: true
